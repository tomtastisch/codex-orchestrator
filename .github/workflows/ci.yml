name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  portable:
    name: portable (${{ matrix.os }}, node-${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        # Source of truth: ssot/version.json ("matrix"); enforced by tests/quality-policy.test.mjs.
        node: ["22.13.0", "22", "24.0.0", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run bundle
      - run: npm run verify:bundle

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run bundle
      - run: npm run mcpb:validate
      - run: npm run mcpb:build
      - run: npm run mcpb:verify
      - run: npm run benchmark
      - run: node scripts/bundlecheck.mjs
      - run: npx --yes @anthropic-ai/claude-code plugin validate . --strict
      - run: npm audit --audit-level=moderate
      - name: Read package version
        id: package
        shell: bash
        run: node -e 'const fs=require("node:fs"); fs.appendFileSync(process.env.GITHUB_OUTPUT, "version=" + require("./package.json").version + "\n")'
      - name: Upload verified PR artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-${{ github.sha }}-v${{ steps.package.outputs.version }}
          path: |
            release/*.mcpb
            release/*.sha256
            coverage/summary.txt
          if-no-files-found: error
          retention-days: 7

  remote-acceptance:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run bundle
      - run: npm run test:remote

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [portable, quality, remote-acceptance]
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
