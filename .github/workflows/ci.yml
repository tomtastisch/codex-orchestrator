name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  portable:
    name: portable (${{ matrix.os }}, node-${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run bundle
      - run: npm run verify:bundle

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:coverage
      - run: npm run bundle
      - run: npm run verify:bundle
      - run: npm run mcpb:validate
      - run: npm run mcpb:build
      - run: npm run mcpb:verify
      - run: npm run benchmark
      - run: node scripts/bundlecheck.mjs
      - run: npx --yes @anthropic-ai/claude-code plugin validate . --strict
      - run: npm audit --audit-level=moderate

  remote-acceptance:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run bundle
      - run: npm run test:remote

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [portable, quality, remote-acceptance]
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
