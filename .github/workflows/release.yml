name: Release current version

on:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: codex-orchestrator-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Detect a version change
        id: version
        shell: bash
        run: |
          set -euo pipefail
          current_version=$(node -p "require('./package.json').version")
          previous_version=$(git show HEAD^:package.json 2>/dev/null | node -e '
            let input = "";
            process.stdin.on("data", (chunk) => input += chunk);
            process.stdin.on("end", () => process.stdout.write(JSON.parse(input).version));
          ' || true)
          if [ "$previous_version" = "$current_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! [[ "$current_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version is not stable semantic versioning: $current_version" >&2
            exit 1
          fi
          {
            echo "changed=true"
            echo "current=$current_version"
            echo "previous=$previous_version"
            echo "tag=v$current_version"
          } >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci
      - name: Validate an existing version tag
        if: steps.version.outputs.changed == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          remote_tag_sha=$(git ls-remote --tags --refs origin "refs/tags/$TAG" | awk 'NR == 1 { print $1 }')
          if [ -n "$remote_tag_sha" ] && [ "$remote_tag_sha" != "$GITHUB_SHA" ]; then
            echo "Release tag $TAG is immutable and points to $remote_tag_sha instead of $GITHUB_SHA" >&2
            exit 1
          fi
      - name: Verify release candidate
        if: steps.version.outputs.changed == 'true'
        run: |
          set -euo pipefail
          npm run typecheck
          npm test
          npm run bundle
          npm run verify:bundle
          npm run mcpb:validate
          npm run mcpb:build
          npm run mcpb:verify
          npm run benchmark
          node scripts/bundlecheck.mjs
          npx --yes @anthropic-ai/claude-code plugin validate . --strict
          npm audit --audit-level=moderate
      - name: Publish current version
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.current }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "release/codex-orchestrator-$VERSION.mcpb" \
              "release/codex-orchestrator-$VERSION.mcpb.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Codex Orchestrator $VERSION" \
              --draft=false \
              --prerelease=false \
              --latest
          else
            gh release create "$TAG" \
              "release/codex-orchestrator-$VERSION.mcpb" \
              "release/codex-orchestrator-$VERSION.mcpb.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Codex Orchestrator $VERSION" \
              --generate-notes \
              --latest
          fi
      - name: Remove superseded releases and version tags
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            [ "$tag" = "$CURRENT_TAG" ] && continue
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName')

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            [ "$tag" = "$CURRENT_TAG" ] && continue
            [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || continue
            git push origin ":refs/tags/$tag"
          done < <(git ls-remote --tags --refs origin 'refs/tags/v*' | awk '{ sub("refs/tags/", "", $2); print $2 }')

          gh release edit "$CURRENT_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --prerelease=false \
            --latest
      - name: Verify the single-release invariant
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          release_count=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq 'length')
          tag_count=$(git ls-remote --tags origin 'refs/tags/v*' | awk '!/\^\{\}$/ { count++ } END { print count + 0 }')
          release_tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName,isDraft,isPrerelease --jq '.[0] | select(.isDraft == false and .isPrerelease == false) | .tagName')
          remote_tag=$(git ls-remote --tags origin "refs/tags/$CURRENT_TAG" | awk 'NR == 1 { print $2 }')
          if [ "$release_count" -ne 1 ] || [ "$tag_count" -ne 1 ]; then
            echo "Expected one release and one version tag; got releases=$release_count tags=$tag_count" >&2
            exit 1
          fi
          if [ "$release_tag" != "$CURRENT_TAG" ] || [ "$remote_tag" != "refs/tags/$CURRENT_TAG" ]; then
            echo "Current release or tag does not match $CURRENT_TAG" >&2
            exit 1
          fi
